name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        # Informational: surfaces lints without failing the build (no -D warnings).
        run: cargo clippy --workspace --all-targets
      - name: Test
        # Ignored live-API smoke tests (claude-cli / anthropic) do not run here,
        # so no secrets are required.
        run: cargo test --workspace
