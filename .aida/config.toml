# AIDA distributed mode configuration
[deployment]
mode = "distributed"
store_path = ".aida-store"
store_type = "worktree"
branch = "aida-store"

[store.sync]
# Auto-push store commits after local writes. Values: manual,
# session-end, per-write, periodic. `periodic` is reserved until
# aida-worker (EPIC-30) ships.
auto_push = "manual"

# trace:EPIC-1-052 Phase 2 | ai:claude
# How `aida add` chooses between agreed-id blocks and node-aware ids:
#   node-aware-only      — never use blocks; always FR-<NODE>-<SEQ>
#   blocks-then-fallback — try block first; fall through silently (default)
#   blocks-only          — error if no block is allocated for the type
#
# counter_scope (FR-271):
#   global               — single counter shared across all types (default for new projects)
#                          → FR-1, BUG-2, EPIC-3, ... ids globally unique by number
#   per-type             — separate counter per type prefix (legacy default)
#                          → FR-1, BUG-1, EPIC-1, ... each type starts fresh
[id_format]
policy = "blocks-then-fallback"
counter_scope = "global"

# trace:TASK-281 | ai:claude
# Auto-claim a fresh block when aggregate remaining IDs drop below
# threshold. On by default (threshold 20, size 100). Opt out with:
#   [block_allocation]
#   auto_claim = false
# Per-type override (e.g. larger BUG blocks):
#   [block_allocation.bug]
#   auto_claim_threshold = 50
#   auto_claim_size = 200
