title: 'You call meaning-without-freedom a ''pretence'' and say belief in freedom ''carries an obligation.'' But notice the order: you elected the belief because it secures meaning, and now the obligation arrives as its luggage. So the obligation is one you issued to yourself by choosing the premise that entails it. How is a self-issued obligation — binding only because you adopted the belief that binds you — different from the self-reference you just called ''pretence''? And if you''d call the other side''s contentment-without-freedom a pretence too, what is the test that makes one honest seeing and the other mere dressing-up — given you''ve granted no evidence could ever part them?'
