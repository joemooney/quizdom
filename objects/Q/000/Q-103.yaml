  answer: free-text
  origin: Q-102

  Generated from origin question: You say the choice leaves no trace but the new position itself. Yet that position is the very same state a determinist points to as 'B followed A' — identical down to the last atom whether you 'freely chose' it or it was forced. So if everything left behind is exhausted by the position, and the position is shared by both stories, where does the *freedom* reside? Is 'I did make the choice' a further fact about the world, or a stance you take toward a state that, in itself, says nothing about whether it could have been otherwise?
