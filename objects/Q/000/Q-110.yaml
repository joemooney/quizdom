title: 'But hear what your biconditional just did: it made the two sides perfectly symmetric — adopt the axiom and the duty follows; decline it and it doesn''t, each branch internally faultless. So on this telling neither side is a pretence; both are valid inferences from their chosen premise. Yet a moment ago you called meaning-without-freedom *the* pretence. That charge can''t come from the logic, since the no-freedom branch is just as consistent as yours. So where does ''pretence'' enter? It seems to attach not to any incoherence but solely to having chosen the axiom you''d rather not — the other person''s premise. Then isn''t ''pretence'' simply the name you give the axiom you declined, and ''carrying'' the name you give the one you elected — the same act, honored on your side and indicted on theirs? If so, what is left of the distinction once we strip away which premise happens to be yours?'
