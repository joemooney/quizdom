  Generated from origin question: You've now named the denominator openly — answerability — and you exclude the storm's power and the mutation's novelty because no one is answerable for them. But watch how you drew the set: a power or a novelty earns a place among your 'weighty' labels only once answerability is already in it; the agent-less instances you simply rule out as 'not what we mean.' So answerability was never one common denominator among several independently weighty labels — it was the *sole* weight, and power and novelty were only ever answerability wearing other coats. That dissolves the very paradox you rested on at Q-113 ('they all carry weight'): there was one weight all along, and you've just named it Duty. Grant that. But it hands straight back the question this whole climb was meant to settle. A storm differs-from-otherwise too, yet isn't answerable — so answerability is difference *plus* 'it traces back to you.' What in freedom supplies that 'back to you' — the ownership Q-46 first demanded — rather than your having merely stipulated that only agent-differences count as freedom's? If it's stipulation, 'answerability' is the label you pin, not the thing freedom delivers; if it's not, name what in freedom does the delivering.
