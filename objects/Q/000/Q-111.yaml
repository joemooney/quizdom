title: 'Good — you''ve now pinned ''pretence'' to one precise thing: asserting a duty without the freedom that would ground it. So the no-freedom person who claims no duty is fully consistent, and only the one who smuggles in obligation pretends. Now turn that rule on your own side. Does freedom *by itself* entail duty — or is ''belief in freedom carries an obligation'' a second thing you assert, which the freedom doesn''t deliver on its own? Earlier you granted the obligation binds only because you adopted the belief that issues it. If so, the entailment isn''t free-standing: you too claim a duty whose ground you''ve merely posited. What makes freedom actually *yield* the obligation — rather than just being paired with it by your election — such that your ''carrying'' passes the very test that convicts the other side?'
