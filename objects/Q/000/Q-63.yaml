  Generated from origin question: You now grant the soul authors only the action, not the reaction — and you judge a path by whether its outcome is 'satisfactory' enough to keep or roll back. But that standard of 'satisfactory' is doing the real work. Does it come from the soul (in which case it's the soul's fixed nature deciding again — prior cause), or from the reaction the soul didn't author (in which case the world, not your will, sets what counts as fit)? If from neither, what is left to make the rollback a choice rather than just trying again until something random sticks?
