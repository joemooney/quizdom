title: If the soul just *is* the system's state, then the soul that reevaluates is the old state and the 'new soul' is only the result of an action-plus-reaction it didn't fully author. So which state does the choosing — the old one (prior cause again) or the new one (which didn't exist yet to choose itself)? What persists across the swap to be the *willer* rather than just one state being overwritten by the next?
