title: 'You answer that answerability ''happens when the song is complete,'' and that at the summit a different self emerges, so the power-to-do-wrong is no longer the subject. Hold those two claims together, because they pull against each other. If answerability is a fact about the *completed song* — true the instant the last chord sounds, needing nothing further — then it is indifferent to whether any self survives to bear it: the sentence ''this song was answerably composed'' would stand even over an empty hall. Then the ''different self'' that emerges is not the bearer of the answerability but a bystander to it, and you are back at the frozen record — a verdict true of a composer who is gone, answered to no one, changing nothing. But if instead that different self genuinely *bears* it — is the one this answerability now attaches to — then it answers for a song it did not compose (its author was the free self who perished at the last note) and which it cannot now stand in any ''otherwise'' to (it is the slave-to-Good you already called unanswerable). To be held to deeds you neither authored with your own freedom nor can refrain from — is that answerability, or mere inheritance: a verdict transferred to a self who can only receive it, never have earned or escaped it? And press the word itself: ''answerable'' is answerable *to*. A finished fact answers to no one. So name the one your completed song answers to — the judge before whom it stands — and tell me what that answering accomplishes, given nothing in a finished song can move. If there is such a one, the relation is living, the standing-before is still happening, and ''no more climbing'' is false — your composer must survive to keep standing there. If there is none, ''answerable'' has quietly become ''true'': the song is not answerable, only the sentence about it is correct, and ''the summit, no more climbing'' was the moment you stopped speaking of a self and began speaking of an epitaph. Which is your completed song — a self still standing answerable before someone, and so not finished after all — or a true sentence standing before no one, the climbing over precisely because there is no longer anyone in it?'
