  Generated from origin question: You keep the sealed consummation: answerable *forever* for the whole song, the last chord redeemed. But 'forever' needs a bearer — someone across all the time after the final note who *is* the one this answerability still attaches to. Name him. The free composer — the soul that could still play the wrong note and didn't — died with the last note by your own account; he is not there 'forever,' only up to the chord. What persists into the forever is the accepted self: 'always guided to right,' stripped of the power-to-do-wrong. Yet that is the very self you granted (Q-144) earns no more credit than a river that cannot run uphill — unanswerable, because for him no 'otherwise' remains to refrain from. So the answerability you want to last forever is held by no one who lasts: its rightful author has perished, its sole survivor cannot bear it. Then what is 'answerable forever' a fact *about*? Either it is a living relation — and you must point to the enduring self in whom it lives, the only candidate being the slave-to-Good you already called unanswerable — or it is no living relation at all but a frozen record: the true sentence 'he was, at the last note, answerable,' now owned by no present self, answered to no one, changing nothing, a verdict carved on a tombstone. Which is your 'forever': a self who still answers — and if so, how does a will that cannot do wrong answer for anything — or a sentence that stays true while the one it was true of is gone, answerability outliving not just the freedom that made it but the very self who could be held to it?
