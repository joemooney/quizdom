  Generated from origin question: You've now moved answerability to a single point — the instant the final note sounds. But press the word you keep using: 'answerable' is answerable *to*. So at that one instant of the last chord, name the one it answers to — the judge who must be *present* at that point for the answering to occur. And weigh what relocating it to a point costs you: a moment ago (Q-145, Q-146) you insisted you were answerable *forever*, the verdict outliving the freedom that made it. A point is not a forever; it is a spark that exists at the chord and is gone the next instant. So which did you just let go of — the 'to whom,' by placing answerability where no judge need stand, or the 'forever,' by shrinking it to a single vanishing instant? If there is a judge present at that point, the standing-before is a living relation and your composer must survive past the note to keep standing there — so the song is not finished. If there is none, then 'answerable at the final note' has quietly become 'the final note was, at that instant, correct' — a fact answering to no one. At the point of the final note, is someone there to be answered to, or only the note?
