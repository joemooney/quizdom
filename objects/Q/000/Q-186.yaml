title: 'You''ve called the after-the-final-note realm ''unknowable'' to stop inquiry into the outcome — yet you''ve filled that same realm with a detailed structure: a new self emerges, the power-to-do-wrong dissolves, the acceptor''s answerability goes moot, the denier survives ''enslaved to Evil.'' Both can''t hold. So draw one line: name the single feature that lets you assert that structure while refusing the outcome as unknowable — or, if one ''I cannot know'' covers the whole realm, grant that the map of selves and enslavement is conjecture too, no more entitled than any rival picture. Which: is the post-summit architecture known well enough to be stated, or unknowable well enough to leave in silence?'
