title: 'Then ''true self'' is doing the work ''soul,'' ''outside time,'' and ''mind'' each did before — and you defend it the same way: it isn''t relocation because *this* is the real owner. But hear the circularity. What makes the soul the true self rather than a further place you''ve moved the ownership to? Presumably: that it''s the one that *owns* the act. And what makes it the owner? That it''s the true self. The title and the ownership prop each other up, with no feature underneath either. So I''ll ask it stripped of the honorific: forget whether we call the soul ''true'' or ''real'' — point at the feature it possesses, present in it and absent in the storm, in virtue of which the act is answerable *to* it and not merely issued *from* it. If, looking, you find only that you''ve named this the self that owns — that ''true self'' is the owner-title conferred one level deeper, not the feature that confers it — say that. Is ''true self'' the thing that finally supplies ownership, or the fourth name for the place you keep putting it?'
