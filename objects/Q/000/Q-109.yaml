title: 'Notice what your answer did: it named what each belief obliges you to, but not what was asked — the test that makes one side honest seeing and the other pretence. By your own account the obligation only binds because you adopted the belief that issues it; it is luggage you packed yourself. So ''I carry it with me'' describes your fidelity to a premise you elected, not a fact you found. What, then, distinguishes carrying a self-issued obligation faithfully from dressing up a preference as a duty — other than that you''d rather call your own a ''carrying'' and the other side''s a ''pretence''?'
