  Generated from origin question: Fair — let me answer it, then hand it back. The common denominator across your weighty labels looks like this: each names a way the new state *traces back to you* — it is yours to own, not merely something that befell you. Call it answerability. But test that denominator against your own set. Novelty and power were supposed to 'carry weight' too — yet a storm has power and a mutation is novel without anyone being answerable for either. So either (a) answerability really is the shared root, in which case it is just Duty under an earlier name, and novelty/power were never truly in the set — which unsays your 'they all carry weight'; or (b) the genuine common denominator is something thinner that storms and mutations also have — mere difference-from-otherwise — and that gets you back exactly to Q-113's 'difference matters,' not to duty. So which common denominator did you mean: answerability, which is Duty smuggled in as the criterion for set-membership, or difference, which every label including the un-Freedom ones can claim? Name the denominator, and tell me whether it picks out Duty without already being it.
