  Generated from origin question: You concede the decisive point: the belief 'I freely chose' would, even at best, be indistinguishable from a hallucination of having chosen. But a hallucination is precisely a seeming that misrepresents what is there. So in granting that, haven't you admitted 'I am free' is a belief you would hold in exactly the same way whether or not it were true? And if no possible difference — outer or inner — could ever tell the two apart, in what sense is it still a belief *about* anything, rather than a feeling you've decided to honor?
