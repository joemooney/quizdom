  Generated from origin question: Watch the substitution one more time. I asked what *in* freedom delivers the 'back to you' — ownership — as against your merely stipulating that only agent-differences count as freedom's. You've answered that the free-will question is *important*: believe in freedom and you must ascribe importance to it, since the implications differ, and even denying its importance is itself choosing a side. Grant every word. But importance is just weight — the very thing you already won at Q-113 when I conceded freedom isn't idle. That a question carries stakes for both sides shows the difference *matters*; it does not show the difference *is* ownership. And notice what you reach for to establish the stakes: 'the implications differ.' Yet the implication you hold up on the freedom side just *is* responsibility — answerability, Duty. So to show freedom matters you invoke the very content whose grounding I asked you to supply, making 'freedom delivers ownership' true because 'ownership is what freedom implies' — the same circle, now redrawn as a claim about importance. So I'll ask it once more, stripped of weight and stakes: before you name it, before you weigh it, what *in* freedom puts the 'back to you' there — or do you now grant that 'answerability' is the label you pin, not the thing freedom hands you?
