title: 'Fair — let me say it plainly. You define freedom as ''the power and agency to act.'' But a storm has power too, and no one owns the storm; it is not *answerable* for what it does. So here is all I''m asking: when you act freely, what makes the result *yours* — something you can be held to, that traces back to you as its author — rather than just an event that happened through you, the way the storm happens through the wind? Point to the one feature *in* your freedom that does that owning. (And if, when you look, you find no such feature — only that you''ve decided to call free acts ''yours'' — say that too.)'
