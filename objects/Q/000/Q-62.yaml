  origin: Q-61

  Generated from origin question: You point past reason to aesthetic 'fit' — a note can be right without being either calculated or random. But when your soul senses that fit, is it *recognizing* a rightness that was already there to be found (which would anchor the choice in something prior), or *conferring* rightness in the act of choosing? If it recognizes, what makes the standard yours rather than a prior cause; if it confers, what makes one conferral less arbitrary than the chance you rejected?
