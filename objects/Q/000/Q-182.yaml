title: 'Granted — leave the after-point alone; whatever lies past the final note, you''ve said free will doesn''t, so there''s nothing there to reason about, and I won''t. I''ll stay on this side of it, where the hope is still held. But look at what you now say you hope reaches you: that your conviction was *strong* enough, that you were *sufficiently prepared*. Hold those against the verdict the hope was supposed to be about — ''a life well lived.'' Strength of conviction is not the same thing: a person can grip a belief with total firmness and still have lived badly; firmness measures how hard you held, not whether the holding was warranted. And ''prepared for the outcome'' is readiness, bracing — not desert, not having-lived-well. So has the object of the hope quietly changed under you? At Q-157 you hoped ''well lived'' was within reach; now you hope your *grip* was tight and your *nerve* was ready. Those could come apart entirely — the firmest, best-braced conviction could still crown a life that wasn''t well lived. So tell me which you''re actually hoping for: that your life *was* well lived — a verdict about the life — or only that you held your belief strongly and met the end unflinching — a verdict about your *resolve*? And if it''s the resolve you can honestly hope for and not the life, then is ''well lived'' still the thing within reach at all — or has it become the name you give to having gripped the conviction tightly enough at the close, the epitaph praising the grip and saying nothing of the climb it gripped?'
