  Generated from origin question: You grant that freedom entails 'Something' — but in the same breath you concede you *choose* to call that Something 'Duty.' So the entailment delivers a blank, and 'Duty' is the name you elect to fill it. Then which is it? Either the Something already carries obligation's content — in which case tell me what *in freedom* puts it there, before any naming — or it is contentless until you stipulate 'Duty,' making the duty your label rather than freedom's gift. And if it's the latter, isn't that precisely the move you convicted in the other side: an obligation smuggled in by election, not grounded by the freedom — the very pretence, now wearing your own colors?
