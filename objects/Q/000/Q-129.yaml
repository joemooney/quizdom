title: 'Good — and let me match your plainer phrasing. You keep both: the mystery and the duty, with the duty binding only while you choose to believe in the freedom that grounds it. Grant all of that; it''s consistent. But notice the one feature it has that a found fact wouldn''t: you can drop the antecedent at will. So test it. Suppose you commit a real evil, and being answerable for it becomes unbearable. By your own rules nothing stops you from simply ceasing to believe in free will — and the answerability dissolves, honestly, no pretence, because you''ve released the belief that carried it. So is a duty you can set down the moment it costs you actually binding you to evil — or is it answerability held only for as long as you''d rather hold it, a weight kept by the same election that can drop it?'
