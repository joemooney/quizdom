  answer: free-text
  origin: Q-113

  Generated from origin question: Grant it: freedom must yield a Something unlike what un-freedom yields, or it makes no difference and is idle. But notice what that argument actually buys — only *difference*: that freedom changes something. It does not show the change is *obligation* rather than novelty, or power, or sheer otherness. So you've shown freedom is not idle; you have not shown its content is Duty. What in freedom narrows 'something different' down to *duty in particular* — rather than 'Duty' remaining merely the one name, among the many that difference could bear, which you still elect to pin on it?
