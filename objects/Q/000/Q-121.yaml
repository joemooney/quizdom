title: 'Two words in your answer carry the weight: the timeless being ''owns and causes'' each action — and the whole thing is ''axiomatic.'' Take them apart. ''Causes'' is exactly the storm''s thin sense: the gust issues from the storm, is caused by it, shapes the world as the storm''s doing — yet that never made it the storm''s to answer for. So causing cannot be what supplies ownership; it is the very sense Q-120 set aside. That leaves ''owns,'' held as an axiom. But to make ''this being owns each action'' axiomatic is just to define the being as the owner — to write ownership into it by stipulation rather than find it there. Notice that is the declaring again, only moved one step back: instead of laying ''mine'' on the outcome, you now lay it on the being, and call the laying an axiom. So, once more, and answer either way: setting aside that you have *defined* this being as the owner, what does it *possess* — some feature present in it — that the storm lacks, in virtue of which the action is answerable to it and not merely issued from it? Or do you grant that ''owns'' here is not a feature you find in the being but a title you confer — the same ''mine,'' relocated from the deed to its doer?'
