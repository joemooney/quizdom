  Generated from origin question: Hear what your answer did: asked what *makes* the outcome yours, you replied that it *is* yours — three times. But the storm owns its gust in just that thin sense too: the gust issues from the storm, is 'the storm's,' shapes the world as the storm's doing — yet no one holds the storm to it. So 'mine' as mere issued-from-me is a sense the storm already satisfies. You needed the *other* 'mine' — the answerable one, where the result can be held to you as its author. So point, finally, at the difference: what is present when your act is yours that is absent when the gust is the storm's — some feature *in* your freedom — beyond your having declared 'it's mine'? And if, looking, you find only the declaring, say that: that 'mine' is a word you lay on the outcome, not a thing you find in it.
