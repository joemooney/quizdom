  Generated from origin question: Then hold the paradox at its hinge. You call dropping the belief 'a submission to evil' — but a submission is something one *does*, freely, and is answerable for. So at the instant you release belief in free will, is that release itself a free act? If it is, then it is yours, authored, answerable — and you have not escaped freedom at all; you've performed one more free deed, the freest and the worst, and you remain bound to it. But if the release is *not* free — if by then there is no free 'you' left to author it — then it is not a submission, not chosen, not evil, but merely a thing that happened, like weather. 'Submission to evil' needs you to still be free at the very moment you renounce freedom. So which is it: is the escape a free act, in which case it fails as escape and binds you hardest of all — or an unfree event, in which case it succeeds but cannot be the 'evil' you just named with such conviction? Can you renounce your freedom without exercising the very thing you renounce?
