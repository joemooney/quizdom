  origin: Q-99

  Generated from origin question: You've collapsed the premise: not 'choice produces a new state' but 'the choice *is* the state.' Grant that identity. Then 'could I have chosen otherwise in the same prior conditions?' becomes 'could this state have been a different state while being the same state?' — which is either incoherent or trivially no. So does identifying choice with state actually secure freedom, or does it dissolve the question by making 'otherwise' unsayable — leaving 'free' as a word that no longer marks any difference between your view and pure determinism?
