title: You now locate choice in the 'distance between two adjacent states' — something that 'exists and does not exist' and that the materialist will never find by looking at the states themselves. But a distance between two points is fully fixed once you fix the two points; it adds no third thing. So is your 'choice' anything more than a name we give to the gap between state A and state B after the fact — and if it leaves no trace the materialist could ever find, what distinguishes 'I freely chose B' from simply 'B followed A'? What work is the word 'free' still doing here?
