title: /objection — pin the exchange on a contested point until /resolved (objector) or /judge (other party -> Observer rules)
description: |-
  A courtroom interaction (extends EPIC-158's rest-case/verdict vocabulary) for mid-dialogue contestation. Either party can raise an OBJECTION; the session STICKS on it until withdrawn or adjudicated.

  MECHANIC:
  - '/objection <text>' (EITHER party — user, or the LLM interrogator) raises an objection and puts the session into an OBJECTION state PINNED to that point: the questioner narrows its next questions to the objection (a mini-goal), normal advancement pauses, and a status indicator shows the open objection (court gavel motif).
  - EXIT (asymmetric, as the user specified):
    * '/resolved' — ONLY the OBJECTING party may call it: withdraws/accepts resolution -> clears, returns to normal flow (log the resolution).
    * '/judge' — ONLY the OTHER (non-objecting) party may call it: escalates to the OBSERVER, which renders a BELIEF-NEUTRAL ruling — SUSTAINED (the objection is material + not yet addressed) or OVERRULED (immaterial / already addressed) + what would resolve it. Belief-neutral: judges the objection's STRUCTURAL standing, NOT which belief is true. Clears the objection after ruling.
  - One active objection at a time (raising a second while one is open -> 'resolve the open objection first').
  - Interrogator proactivity: bounded (see DECIDED comment) — it does not spam objections.
  - OFFLINE: '/judge' needs the LLM Observer -> degrades to a 'needs an LLM backend' note; '/objection' and '/resolved' are pure state transitions and still work.

  Lane: session.rs (the objection state + pin/narrow + the three commands + asymmetric caller guard) + observer.rs (the belief-neutral ruling) + palette.rs (register the commands) + tui.rs/style.rs (the open-objection status motif) + headless breadcrumb. Reuses observer::* and the goal-narrowing path from STORY-159.

  ## Acceptance
  - '/objection' from either party pins the exchange; the questioner narrows to it; status shows it open.
  - '/resolved' works ONLY for the objector; '/judge' works ONLY for the other party; wrong-caller is rejected with a helpful note.
  - '/judge' yields a belief-neutral SUSTAINED/OVERRULED ruling from the Observer + the resolving condition; clears the objection.
  - One-at-a-time guard; offline degrade for '/judge'; belief-neutral throughout.
  - Mocked-LLM tests cover: raise+pin, /resolved by objector, wrong-caller rejection, /judge sustained + overruled, one-at-a-time guard, offline degrade.
