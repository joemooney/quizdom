  content: 'Implemented weighted-probabilistic successor selection in strategy.rs: new WeightSampler seam (XorShiftWeightSampler from_entropy + with_seed) and WeightedNextQuestionStrategy. eligible_for_sampling() restricts to the highest STORY-48 relevance tier (answer-conditioned > unconditional) and excludes weight:0, then samples proportional to weight via the pure weighted_index() core. Wired as --strategy weighted / QUIZDOM_STRATEGY=weighted. Tests cover distribution sweep, weight:0 exclusion, all-zero->None, from-answer filtering, tier precedence, and reproducible seeding. cargo test/fmt/clippy clean.'
