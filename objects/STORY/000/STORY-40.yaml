title: 'ClaudeCliClient backend: LLMClient via ''claude -p'' on the Max plan (default)'
description: 'Add a ClaudeCliClient implementing the llm crate''s LLMClient (crates/llm): spawn the claude CLI in headless mode (''claude -p --output-format json'' or stream-json), STRIPPING ANTHROPIC_API_KEY from the subprocess env so it auths via the Max-plan login (OAuth) — no per-token charges. Mirror ~/ai/aida-chat''s ClaudeCliClient (src/server/backends/claude_cli.rs). Make it quizdom''s DEFAULT LLM backend; AnthropicClient becomes opt-in via QUIZDOM_BACKEND=anthropic. Wire the backend selection into the CLI (lib.rs) where the LLM strategy is constructed. Map Message/ToolDef/ToolCall <-> the claude CLI input/output; parse text + tool_use. Per ADR (claude-cli default). ## Acceptance: ClaudeCliClient implements LLMClient; unit tests mock the subprocess I/O (NO live claude call in CI); an #[ignore]''d smoke runs a real ''claude -p'' turn; quizdom defaults to claude-cli, anthropic opt-in via env. Depends on STORY-35 (trait).'
