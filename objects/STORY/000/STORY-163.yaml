title: Slash-command palette overlay ('/' -> menu + descriptions + '?'-per-command help)
description: 'A self-contained crossterm OVERLAY (no ratatui rewrite): typing ''/'' as the first char at a prompt opens a popup listing the available commands each with a one-line description. Filter-as-you-type narrows; arrows navigate; Enter selects/runs the highlighted command; Esc cancels back to the prompt; ''?'' on the highlighted command shows its DETAILED help + rationale. Drive the command list from a single registry (so /help, /tutor, /observe, /synopsis, etc. all appear). Take over the terminal for the menu, render, handle keys, return the choice, restore the prompt. Degrade on non-TTY (typed slash-commands still work). Lane: input.rs + a new palette/overlay module (crossterm). ## Acceptance: ''/'' opens the palette; filter/arrow/Enter/Esc work; ''?'' shows per-command detailed help; running a command routes to the same action as the typed form; non-TTY unaffected; tests cover the registry + selection logic.'
