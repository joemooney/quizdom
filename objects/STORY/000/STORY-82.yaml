  content: Implemented per-session liveness markers for concurrency-safe resume. A '<session>.active' file (holding the owning PID) sits next to each JSONL log, written on session start via an RAII SessionActiveGuard and removed on clean end; a SIGKILL leaves a stale marker that session_is_active() recognizes as dead (PID not in /proc) and thus resumable. Bare 'session resume' now picks the newest session whose marker is absent/stale (skips live ones); explicit resume of a live session is refused (no double-attach). 6 new tests cover multi-session selection, stale-marker handling, and double-attach refusal. session.rs + tests.rs only.
