title: Bare resume targets the latest NON-active session (support concurrent sessions)
description: |-
  STORY-65 made bare 'session resume' pick the most recent session — but with MULTIPLE quizdom sessions possibly running AT ONCE (the user can start several explorations in parallel), bare resume must target the latest session that is NOT currently active (paused/ended, safe to resume), never one a live process is using.

  Requires quizdom to track per-session ACTIVE state (today sessions are just JSONL logs with no liveness marker — distinct from AIDA agent leases): write an active marker (lock + PID) on session start, clear it on clean end. A session is 'active' iff its marker exists AND the process is alive — a STALE marker from a dead process is treated as resumable. Bare resume = newest session with no live active marker. Also guard: explicitly resuming an already-active session should warn/refuse (no double-attach).

  Lane: session.rs (resume resolution + active-state tracking) — bundle with STORY-80/81 (same session.rs lifecycle area). ## Acceptance: with two live sessions + one ended, bare resume picks the ended one; a stale marker (dead PID) is treated as resumable; resuming a live session is refused/warned; tests cover multi-session selection + stale-marker handling.
