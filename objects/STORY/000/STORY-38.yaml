title: Persist LLM-minted questions to the AIDA bank (Q-object + begets edge)
description: 'When the LLM generates a new question, write it back to AIDA as a Q-object (--prefix Q) with a begets edge from the originating question and a seed weight:N, so the bank evolves (ties to EPIC-10). ## Acceptance: a generated question becomes a real Q-object reachable via aida rel list. Depends on the LLM strategy + graph schema (STORY-14).'
