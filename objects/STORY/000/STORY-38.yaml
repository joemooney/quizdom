  content: 'Implemented persistence for LLM-generated questions: generated Q prompts are persisted through aida add --prefix Q with topic, answer, weight:50, and seed tags, then linked from the originating question with a begets edge. Added best-effort duplicate avoidance against near-identical successor questions and unit tests for command construction and duplicate selection. Shipped in PR #9.'
