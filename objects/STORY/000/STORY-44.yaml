  content: 'Implemented settled term persistence for semantic honing: adopted shared definitions and promoted user-specific TERM definitions now produce term_interpreted JSONL events with term_ref/raw_definition/adopted_definition, and the session carries the settled definition forward so later questions probing the same term render the pinned meaning instead of re-asking. User-specific definitions still promote through aida add --type term before being logged. Verified with cargo fmt --all --check, cargo test --workspace, and git diff --check. Shipped in PR #18.'
