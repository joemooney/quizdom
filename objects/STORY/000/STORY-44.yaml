title: Record the user's settled definition; downstream questions use it
description: 'Persist the user''s adopted definition for a term (per ADR-12: in the per-user session log; promote a notable bespoke definition to a TERM node). Make downstream questions in the session use the user''s pinned meaning. ## Acceptance: the settled definition is recorded and re-applied later in the session; promotion of a bespoke definition creates a TERM reachable via aida. Depends on the steering story + ADR-12.'
