title: Capable free-text answer editor in the TUI — readline/Emacs (+optional Vim) via tui-textarea, plus open-in-$EDITOR escape
description: |-
  The TUI free-text answer box (tui.rs) is an append-only String today (editing.push(c)/editing.pop() + Enter only) — no cursor movement, word motions, or kill/yank. Give FREE-TEXT answers a capable editor with bash-command-line ergonomics. (Yes/No + multiple-choice keep their single-key, no-Enter controls — the rich editor is the FREE-TEXT path only, so 'y' still means Yes, not a typed char.)

  EDITOR: adopt tui-textarea (the standard ratatui editor widget). Default = Emacs/readline keybindings (Ctrl-A/E/F/B, Ctrl-W/K/U kill, Ctrl-Y yank, Alt-B/F/D word motions, Home/End, arrows), multi-line, undo/redo, kill-ring. (rustyline STAYS for the headless LineFrontEnd; tui-textarea is its TUI analog.) Editing MODEL per decision: Emacs default and/or a Vim MODAL toggle (set -o vi style — tui-textarea ships a vim example to wire the modal layer).

  OPEN-IN-$EDITOR escape (bash Ctrl-X Ctrl-E analog) per decision: a key suspends the TUI (leave/restore the alternate screen cleanly via the existing TerminalGuard), writes the current buffer to a tempfile, launches $VISUAL/$EDITOR, and reads it back on save/exit — the ultimate vim/emacs for long-form answers. The headless path can offer the same.

  COEXISTENCE: on a FREE-TEXT question the editor owns the keys; '/' still opens the palette when the buffer is EMPTY (as today); single-key controls (Y/N/X/P/B) apply on yes/no & MC questions, not free-text. Submit: Enter submits; long/multi-line via the $EDITOR escape (or a newline key) per decision.

  Lane: Cargo.toml (add tui-textarea) + tui.rs (swap the free-text editing box for a tui-textarea widget; the $EDITOR-escape flow) + input.rs (free-text path). Compose with the transcript renderer (STORY-179) and keymap (STORY-176) — the editor is a distinct focus from the transcript-scroll keys.

  ## Acceptance
  - Free-text answers support readline/Emacs motions: word-left/right, line start/end, kill-line, yank, undo.
  - (If decided) a Vim modal toggle gives normal/insert editing.
  - (If decided) an $EDITOR-escape key opens $VISUAL/$EDITOR, round-trips the buffer, and restores the TUI cleanly.
  - Yes/No & MC keep single-key no-Enter controls; '/' palette still opens from an empty free-text box.
  - Headless/LineFrontEnd editing unchanged (rustyline); existing piped tests pass.
  - Tests: editor motion wiring where testable, the $EDITOR round-trip (mocked command), free-text-vs-single-key routing by question type, '/'-from-empty still opens the palette.
