  content: 'Refinement (user): when a GOAL is set, the gauge expresses ESTIMATED DISTANCE TO GOAL — progress toward resolving it (''~70% of the way to settling X; the open thread is whether determinism undermines responsibility''), not just abstract structural roundedness. This unifies with EPIC-154/STORY-159 (roundedness already measured w.r.t. the goal). So: goal set -> ''distance-to-goal'' gauge (composite roundedness scoped to the goal + the limiting gap as the remaining distance); no goal -> general roundedness. Same on-demand-by-default + gate-recompute cost guard. The ''limiting gap'' IS the distance.'
