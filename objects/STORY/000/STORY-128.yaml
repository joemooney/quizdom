title: 'Session synopsis mode (global): in-session key + ''quizdom session synopsis <id>'''
description: 'The GLOBAL mode, using the observer engine over the full session log: summarize the arc — positions taken, how they evolved, internal consistency, where you stand, what''s unresolved — with the belief-neutral engagement assessment (clarity/consistency/precision), NOT belief grading. Surface it via an in-session key AND a standalone ''quizdom session synopsis <id> [--user]'' command (mirror ''quizdom session show''/''contradictions'' dispatch in main.rs). May lean on EPIC-9 contradiction detection for the ''tensions'' part. Lane: observer.rs/llm + main.rs + reads the JSONL log. ## Acceptance: synopsis (key + command) summarizes positions + consistency + open threads, assessed on engagement only, never advocating a belief; offline degrades to a structural summary; tests cover the command + rendering against a sample log.'
