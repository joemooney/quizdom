title: Render simple inline markdown in the TUI transcript (emphasis/strong/code), composed with role + quote colors
description: |-
  The interrogator/observer emit markdown — '*going toward*', '`code`', and (DECIDED) block constructs too. The TUI must RENDER it instead of showing literal markers.

  SCOPE (DECIDED: inline + basic block):
  - INLINE: *emph*/_emph_ -> italic, **strong**/__strong__ -> bold, `code` -> a code style. Markers hidden.
  - BLOCK: bullet + numbered LISTS (render a bullet/number with hanging indent), HEADINGS (terminals have no font size -> bold + a distinct heading color, maybe underline), BLOCKQUOTES (left indent + a muted '|' bar), FENCED CODE BLOCKS (a dim monospace block; no inline parsing inside). Paragraph wrapping/reflow to the transcript pane width, per block.

  ARCHITECTURE: render each transcript MESSAGE (not line-by-line) by parsing with pulldown-cmark, then walking the event stream to build ratatui Text/Lines OURSELVES (do NOT hand the styling to a 3rd-party renderer) so we keep control of:
  - the line's ROLE base color (STORY-171 — interrogator cyan, etc.) as the default fg,
  - the QUOTE-YELLOW rule (BUG-178) applied to quoted spans within inline text runs,
  - emphasis/strong/code as MODIFIERS on top of the role color.
  This SUBSUMES BUG-178's per-line span scanner — BUG-178's quote-yellow is realized as a pass over the inline text runs inside this renderer. CO-IMPLEMENT BUG-178 + STORY-179 as ONE markdown-rendering component (one agent, one rewrite).

  DEPENDENCY: add pulldown-cmark (standard pure-Rust CommonMark parser) to crates/quizdom. Keep the quote-yellow + role layering custom on top of its events.

  PARSE/SAFETY: pulldown-cmark handles CommonMark rules (intraword '_' not emphasized, '2 * 3' literal, escapes, unterminated markers) — rely on it. Apply the single-quote-yellow heuristic (apostrophe-safe, BUG-178) only to text-run events, not inside code spans/blocks.

  HEADLESS UNCHANGED: the LineFrontEnd path keeps LITERAL markdown (the ~336 piped byte-tests assert exact output) — ONLY the TuiFrontEnd renders. The transcript-pane renderer is TUI-only.

  Lane: a new render module (e.g. style.rs/markdown.rs) parsing pulldown-cmark -> ratatui Text with role color + quote-yellow + inline modifiers + block layout; tui.rs transcript pane calls it per message; style.rs theme gains heading/blockquote/code-block/quote colors. Cargo.toml gains pulldown-cmark.

  ## Acceptance
  - Inline: '*going toward*' italic (markers hidden) in the interrogator's cyan; '**x**' bold; '`x`' code-styled.
  - Block: bullet/numbered lists render with markers + hanging indent; headings render bold + heading color; blockquotes indent with a '|' bar; fenced code renders as a dim monospace block (contents not inline-parsed).
  - Composition: role base color + quote-yellow (BUG-178) + inline emphasis all layer correctly in one message; quote-yellow is NOT applied inside code spans/blocks.
  - snake_case / '2 * 3' / escaped markers stay literal (CommonMark via pulldown-cmark).
  - Paragraphs wrap to the pane width; block constructs reflow without crashing.
  - Headless/LineFrontEnd output byte-unchanged (literal markdown); existing piped tests pass.
  - Tests: inline emph/strong/code, list, heading, blockquote, code-fence, quote-yellow-composition, code-span-not-quote-colored, wrap/reflow smoke.
