  content: 'Design: chose option (a) — a from-answer:<value> tag on the generated Q-object (normalized triggering answer; bounded answers only, free-text stays unconditional). NextQuestionStrategy now prefers answer-matching successors, treats untagged successors as unconditional fallbacks, and excludes successors conditioned on a different answer. Option (b) (answer-specific edge attributes) deferred — aida rel add has no edge-tag support; captured as a VIS-2 substrate note in graph-schema.md. Touched model.rs (from_answer_tag helper), persist.rs (persister records the tag), strategy.rs (relevant_successors + triggering_answer), graph-schema.md, plus tests.'
