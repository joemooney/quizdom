title: Q (Quit) single-key control = /end; show [Q] Quit in prompts
description: 'Add a Q/q single-key control mapped to the existing /end behavior (clean end + save), in input.rs. Today ESC maps to /end but isn''t shown; Q is the discoverable key. Update the [Y/N/X/P] prompt to [Y/N/X/P/Q] (and the choice/free-text prompts to mention Q/Quit). NOTE: input.rs is codex-1''s lane (STORY-52 in flight) — sequence this AFTER STORY-52 to avoid colliding in input.rs. ## Acceptance: pressing Q ends + saves the session like /end (resumable later); prompt shows [Q] Quit; tests cover it.'
