title: 'quizdom session show <id>: pretty-print a full session transcript'
description: 'Add a ''quizdom session show <id> [--user]'' command that pretty-prints a past exploration''s full path from the JSONL log: each question + the user''s answer, branch markers, surfaced definitions, and detected/resolved contradictions. Complements ''session list'' (which only shows the last question). Lane: main.rs (new subcommand, mirror ''contradictions''/''curate'') + a transcript renderer that reads logs — disjoint from input.rs. ## Acceptance: ''session show <id>'' renders the full Q&A path with branches + contradictions; tests cover rendering against a sample log.'
