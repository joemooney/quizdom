  content: 'Implemented user meaning capture and LLM mapping for surfaced loaded terms: after competing TERM definitions are shown, the session asks what the user means, maps the free-text meaning to the closest bank TERM via LLMClient when available, and renders a confirmation proposal. Deterministic/offline runs still capture the meaning and skip mapping gracefully. Added mocked LLM mapping tests, session proposal tests, and local deterministic Q-23 smoke coverage. Shipped in PR #12.'
