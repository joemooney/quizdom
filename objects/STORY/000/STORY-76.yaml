  content: |-
    Implemented via commit 02a7845 (PR pending):

    - New crate::style helper colorizes the question title, choice option
      markers, the [Y/N/X/P/B/F/Q] control prompt, surfaced TERM-definition
      headers (honing.rs), and contradiction prompts (styled distinctly via the
      runtime:contradiction tag).
    - Color gated on a process-global flag defaulting off; run_cli enables it at
      startup only when stdout is a TTY and NO_COLOR is unset. Piped use and unit
      tests stay byte-for-byte plain.
    - Dep: anstyle (lightweight, no transitive deps).

    Test status: 111/111 tests green (3 new in style.rs). Verified: piped
    session output emits 0 escape sequences (non-TTY -> plain).
    Follow-ups filed: TASK-89 (lane deviation), TASK-90 (global-flag design call).
