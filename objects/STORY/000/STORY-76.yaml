title: Styled session output (color/structure; honor NO_COLOR + non-TTY)
description: 'The session output is functional but flat plain text. Color/structure it: highlight the question, list options, set off surfaced TERM definitions and contradictions, and style the [Y/N/X/P/B/F/Q] control prompt. Use a lightweight styling crate (anstyle/owo-colors). MUST honor NO_COLOR and degrade to plain when stdout is not a TTY (tests + piped use stay clean). Lane: input.rs + a small style helper — disjoint from main.rs work. ## Acceptance: interactive output is styled; NO_COLOR / non-TTY -> plain; existing tests unaffected.'
