title: 'Debate mode toggle: the questioner steelmans the opposing side'
description: 'An opt-in mode (''--mode debate'' / an in-session toggle): instead of neutral Socratic challenging, the LLM questioner explicitly STEELMANS the OPPOSING position to the user''s and argues it two-sided. The closing verdict then judges which CASE was better-ARGUED (structural/argument quality) — explicitly NOT which belief is TRUE (belief-neutral on truth, fair on craft). Default stays Socratic-neutral-challenger. Lane: strategy.rs (the debate prompt variant) + observer.rs/synopsis.rs (the which-case-better-made verdict) + a mode flag in session.rs/CliConfig. ## Acceptance: debate mode makes the questioner argue the opposing side; the verdict assesses argument structure of each side without asserting a belief is true; default mode unchanged; mocked-LLM tests cover the debate prompt + the structural verdict.'
