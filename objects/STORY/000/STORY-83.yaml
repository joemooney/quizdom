title: Thinking spinner during LLM calls (ascii, stderr, TTY-only)
description: |-
  After the user answers, the blocking LLM call (next-question generation; also honing + contradiction) takes seconds with NO feedback — the CLI looks frozen. Add a small ascii 'thinking' spinner shown during blocking LLM calls.

  Implementation: a reusable spinner util (new spinner.rs) that animates on a BACKGROUND thread and writes to STDERR (so stdout / piped output stays clean), active ONLY when stderr is a TTY (no spinner in tests/pipes). Clear the spinner line before the next output. Wrap the LLM call in strategy.rs (LlmNextQuestionStrategy) for the primary next-question case; honing.rs / contradiction.rs can adopt the same util later.

  Lane: spinner.rs (new) + strategy.rs — disjoint from input.rs (STORY-76), main.rs (STORY-77), and the session.rs lifecycle bundle (STORY-80/81/82), so it can run as its own parallel task. ## Acceptance: interactive LLM calls show an animated spinner on stderr that clears when the answer arrives; non-TTY/piped shows nothing; existing tests unaffected.
