title: 'The closing ritual: rest case -> closing statements -> verdict (+ terminator forfeits last word)'
description: 'A PHASE TRANSITION on ''rest your case'' (either party): the session stops asking QUESTIONS and switches to CLOSING STATEMENTS — the user''s final/settled position and the challenger''s strongest remaining objection, exchanged back and forth — until someone requests a FINAL VERDICT, which renders the belief-neutral roundedness verdict (EPIC-154) w.r.t. the goal. FAIRNESS RULE: the party that calls ''terminate'' does NOT get the last word except to say ''terminate'' — the other side makes the final closing statement first. Lane: session.rs (the closing phase + state machine) + synopsis.rs (verdict reuse) + input.rs (rest/verdict/terminate controls). ## Acceptance: ''rest case'' enters the closing phase (statements, not questions); ''verdict'' renders the belief-neutral assessment; the terminator-forfeits-last-word rule holds; tests cover the phase transition + the rule + offline.'
