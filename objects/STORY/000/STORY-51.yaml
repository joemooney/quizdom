title: Single-key Y/N/X/P input scheme (crossterm, no ENTER)
description: 'Add crossterm; read single keypresses (no ENTER) for belief questions and render a [Y/N/X/P] prompt. Map y->Yes, n->No, x->eXplore, p->Punt. Digit keys for multiple-choice (+x/p); free-text still types+ENTER with x/p as leading escape commands. Degrade to line input where raw mode is unavailable. Foundational for EPIC-50. ## Acceptance: belief questions respond to single y/n/x/p keys with no ENTER; choice uses digits; free-text unaffected; graceful fallback. Depends on EPIC-6 loop.'
