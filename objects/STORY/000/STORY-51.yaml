  content: 'Implemented single-key answer controls in input.rs with crossterm raw-mode reads for interactive TTY yes/no and choice prompts, falling back to line input when raw mode is unavailable or stdin is non-TTY. Yes/no prompts render [Y/N/X/P], choice prompts accept digits plus X/P, and free-text continues using the STORY-55 rustyline path with x/p escape commands normalized to explore/punt. Verified with cargo fmt --all --check, cargo test --workspace, git diff --check, and a piped-input fallback smoke. Shipped in PR #16.'
