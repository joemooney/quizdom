title: Dead-ends just end with no exit; resume of a terminal session should continue, not dead-end
description: |-
  All three dead-end paths abruptly end with no options: in-session no-begets-successor (session.rs:1269), punt-finds-nothing (1183), and RESUME of a session with no saved next_question_ref (1692-1695). User hit the resume case ('No saved follow-up question. Session complete.') and is stuck — feels like a dead-end with no exits.

  Two fixes:
  (1) RESUME CONTINUES: when a resumed session has no saved next_question_ref, do NOT immediately end — re-enter the loop from the LAST ANSWERED question and let the strategy pick/generate the next. With --strategy llm this generates a fresh follow-up, so resume keeps exploring; only end if the strategy genuinely returns None.
  (2) GRACEFUL DEAD-END MENU: when the loop genuinely dead-ends (strategy returns None — deterministic bank exhausted, or the LLM declines), present a menu instead of just ending: [G]enerate a fresh question (LLM, from the current node), [P]unt to a different topic, [A]dd your own question, [S]ynopsis, [Q]uit. With --strategy llm, generation should be ATTEMPTED automatically before ever declaring a dead-end, so this menu is mostly for the deterministic/edge cases. The end-of-session footer (session id + resume cmd) still prints on Quit.

  Belief-neutral; the continue/punt/add options return to exploring (non-destructive). Lane: session.rs (the 3 dead-end paths + resume) + input.rs (the menu). ## Acceptance: resuming a terminal LLM session continues (generates a next) instead of ending; a genuine dead-end shows the option menu and each option works (generate/punt/add/synopsis/quit); deterministic-exhausted reachable; tests cover resume-continues + the menu + offline degrade.
