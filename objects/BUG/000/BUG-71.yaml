title: Resume doesn't restore the original session's strategy (defaults to deterministic) -> LLM sessions dead-end on resume
description: |-
  DEFECT (hit while resuming an --strategy llm session). The session log does NOT persist the strategy/backend, and 'session resume' builds the strategy from the CURRENT command's args (default deterministic via env_strategy; session.rs:273 build_strategy). So resuming an LLM session WITHOUT re-passing --strategy llm silently falls back to deterministic; the resumed frontier is an LLM-generated question with no begets successors in the bank, so it immediately prints 'No follow-up questions. Session complete.' -> looks like resume is broken.

  Fix (session.rs resume config + logger -- codex-1's lane): (1) record the strategy (and the LLM backend/model) in the session log at start; (2) on resume, RESTORE the original strategy/backend unless explicitly overridden by --strategy on the resume command. Then resume continues the LLM exploration seamlessly.

  Workaround: pass --strategy llm on resume.

  ## Acceptance: a session started with --strategy llm resumes WITH llm by default (no need to re-pass); an explicit --strategy on resume overrides; the strategy/backend is recorded in the session log; tests cover restore + explicit-override.
