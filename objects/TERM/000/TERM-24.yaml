title: free will / libertarian
description: |
  source: libertarian (incompatibilist) free will, academic philosophy.

  definition: An agent has free will only if, at the moment of choice and holding
  all prior conditions fixed, the agent could genuinely have chosen otherwise.
  Free will in this sense is incompatible with full causal determinism.

  scope: formal/academic definition, not user-specific. trace:STORY-16 | ai:claude
