title: free will / compatibilist
description: |
  source: compatibilist free will, academic philosophy.

  definition: An agent acts of free will when the action flows from the agent's own
  reasons, desires, and deliberation without external coercion or compulsion — even
  if those mental states are themselves fully caused by prior events. Free will in
  this sense is compatible with causal determinism.

