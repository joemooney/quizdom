  content: 'ADDENDUM (same handoff): ''aida session end'' also HANGS in a non-interactive/no-TTY context — it blocks indefinitely on its ''gh'' CI/PR probe with NO output and NO timeout (observed: a session-end ran 177s with zero output before I killed it). Workaround that worked: ''aida session end <id> --skip-ci -y''. So two concrete fixes for AIDA: (1) timeout/auto-skip the CI probe when stdin isn''t a TTY (or no PR exists); (2) the reaper/chained-handoff from the main note. Filing the hang upstream as a bug.'
