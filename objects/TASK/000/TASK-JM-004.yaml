title: codex lacks /aida-pickup (uses briefs); intent-improvisation makes the gap look intermittent
description: 'A user running a codex implementer agent typed /aida-pickup: worked once, then errored ''Unrecognized command''. Root cause: aida-pickup is NOT in the .codex/skills/ subset (queue/pickup/pr/triage are Claude-only); codex''s coordination channel is BRIEFS (list_briefs / aida brief), not the queue + slash command (docs/agents/codex-brief-pickup.md). The ''worked first time'' was codex improvising on the typed words, not a registered command — which makes a missing capability look like a flaky one. Onboarding/substrate gap: (a) the queue-vs-brief channel split per agent type isn''t obvious to an operator driving a mixed fleet; (b) codex silently improvising a non-existent slash command is a confusing failure mode. Candidate: a clearer ''this agent picks up via briefs'' signal, or scaffolding a codex aida-pickup that just runs the brief flow.'
