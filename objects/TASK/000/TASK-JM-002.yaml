title: AIDA has no native numeric field for per-node weighting
description: 'quizdom needs continuous question weights; AIDA priority is only high/med/low. Workaround: encode as a ''weight:N'' tag. Surfaced by EPIC-5. Candidate AIDA improvement: an optional numeric/score field or first-class weight.'
