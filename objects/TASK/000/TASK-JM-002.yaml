  author: joe
  content: 'Triaged via ADR-22: tags are the intended pattern for ANNOTATION; quizdom''s v1 selection is a bounded in-app max/weighted-sample over one node''s begets successors, so no substrate field is needed yet. Leaving this finding OPEN as a recurrence-driver (per observation-discipline: let recurrence promote it). Recur this when in-app weight re-parsing hurts OR we want weighted traversal inside ''aida graph'' / cross-bank numeric queries — that''s the operational driver that would justify a scoped selection_weight:u8 field in ~/ai/aida.'
