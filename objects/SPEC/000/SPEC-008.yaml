spec_id: SPEC-008
title: aida pr ship assumes main/no-CI path failed in quizdom
description: 'While shipping STORY-15, `aida pr ship` first attempted to create a PR against `main` even though origin HEAD is `master`, producing a GitHub GraphQL base-ref error. After manually creating PR #2 against `master`, `aida pr ship 2` failed its CI wait because quizdom has no .github/workflows. Adding `lifecycle:no-ci-wait` to STORY-15 did not alter this direct `pr ship` behavior. Workaround used: manually create PR #2 with base master, attempt `aida pr ship 2`, then merge docs-only PR via `gh pr merge`.'
