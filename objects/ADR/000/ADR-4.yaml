title: v1 interface is CLI/TUI (Claude-Code-style prompt)
description: 'Build toward a terminal CLI/TUI first: fastest path for the single-user (Joe) v1, and matches the free-text disambiguation model (Claude-Code-style input). Defer a web UI until the multi-user vision and graph visualization justify the cost. Keep the session/graph core interface-agnostic so a web surface can be added later without a rewrite.'
