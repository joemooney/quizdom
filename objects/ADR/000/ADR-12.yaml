title: 'Promote-only: shared knowledge in AIDA, per-user exploration in a lighter log'
description: 'Shared, cross-user knowledge — questions (prefix Q) and definitions (type term) — lives as AIDA objects (per ADR-3). A user''s raw answers and session traversal live in a lighter per-user log (format TBD, EPIC-5). Only notable BELIEF nodes are promoted into AIDA as objects with edges. Rationale: keeps the evolving bank git-canonical and dogfoods AIDA, while avoiding per-answer write churn that would stress a requirements store. Revisit if promotion proves too lossy or the per-user log diverges from the graph model.'
