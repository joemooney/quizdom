title: AI-interface = standalone provider-agnostic 'llm' crate, built fresh in quizdom (aida-chat adopts later)
description: 'Per SPIKE-33: aida-chat''s AI layer is well-built but entangled with its web/session/tool/SSE architecture, so we do NOT extract from it. Instead: quizdom is a cargo WORKSPACE; the AI-interface is a standalone ''llm'' crate exposing a minimal provider-agnostic surface — LLMClient::call(system, &[Message], &[ToolDef]) -> (text, Vec<ToolCall>); AnthropicClient over reqwest (retries + stream aggregation); ClaudeCliClient optional. NO AIDA tools, sessions, or SSE — pure LLM glue. Designed for extraction to its own repo once aida-chat adopts it. This is EPIC-7 work; EPIC-6 (session engine) does NOT need it (deterministic strategy uses app-side rel-list traversal, ADR-31).'
