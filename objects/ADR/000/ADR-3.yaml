title: Domain data lives in the AIDA store (dogfood substrate)
description: 'Model quizdom''s domain data — questions, beliefs, definitions, edges (begets/contradicts/refines/agrees), quality tags and weights — as objects + typed relationships in the AIDA git-canonical store, rather than a separate store. Directly serves VIS-2 (AIDA as general-purpose substrate). Accepted risk: AIDA may strain on graph traversal, edge semantics, and per-edge weighting/scale; where it does, file an AIDA finding rather than working around it silently. Revisit if the strain blocks core UX.'
