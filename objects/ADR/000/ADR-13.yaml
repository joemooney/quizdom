title: Questions version in-place via AIDA object history
description: 'A question that is edited keeps its stable Q-id; AIDA''s built-in per-object history is the audit trail. We do NOT mint a new object per revision (rejected: heavier, fragments weight/selection across variants). Consequence: weighting and insightful/unhelpful tags attach to one durable id over the question''s lifetime. Revisit only if we need independently-weightable variants of the same question.'
