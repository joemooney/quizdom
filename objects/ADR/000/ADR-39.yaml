title: LLM calls default to the claude CLI backend (Max-plan billing); raw Anthropic API is opt-in
description: 'To use the user''s Max plan with NO per-token charges, quizdom''s DEFAULT LLM backend is a ClaudeCliClient that spawns ''claude -p'' with ANTHROPIC_API_KEY stripped from the subprocess env, so it authenticates via the Max-plan login (OAuth/keychain) and draws on the plan allocation (subject to plan rate limits) — NOT the metered Anthropic API. The AnthropicClient (STORY-36; raw /v1/messages with ANTHROPIC_API_KEY) stays available but OPT-IN via QUIZDOM_BACKEND=anthropic, for users who have API credits. Mirrors ~/ai/aida-chat''s two-backend design (AIDA_CHAT_BACKEND). Rationale: the Max/Pro plan does not cover raw API calls — Claude Code and the claude CLI use the plan, the API key is metered separately. The CLI subprocess is the only no-extra-charge path. Caveat: requires the claude CLI installed + logged in with the plan, and is subject to plan rate limits.'
