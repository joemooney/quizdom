title: quizdom built in Rust; factor a shared AI-interface abstraction with ~/ai/aida-chat
description: |-
  quizdom's CLI/TUI (ADR-4) is implemented in RUST. Rationale: ecosystem alignment with AIDA (aida is Rust; quizdom shells out to the aida CLI for data per ADR-3, so the data layer is language-agnostic but Rust keeps the toolchain unified); single static binary; trace conventions already Rust.

  Directive (from Joe): interfacing with AI LLMs is a RECURRING theme across projects, so before building quizdom's AI-interfacing code (EPIC-7), evaluate ~/ai/aida-chat for commonality and factor out a REUSABLE, project-agnostic AI-interface abstraction layer (likely a shared crate) that both aida-chat and quizdom consume — prefer this over bespoke per-project LLM glue. Investigation tracked as a spike.
