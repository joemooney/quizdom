  content: 'Investigated (read-only). RECOMMENDATION: approach (c)+(a) hybrid — a pure presentation-layer transform at the prompt boundary in strategy.rs strategy_prompt: VERBATIM last-~10-turns window + an ID-ANCHORED standing-commitments ledger (one ''Q-46: <first-sentence> => <answer>'' line per older position, ref never paraphrased) + the already-pinned goal/objection header. No new LLM call; StrategyContext/log/resume/synopsis unchanged; short sessions (<=window) byte-identical. Do NOT reuse synopsize() (it would ADD an O(turns) call). Follow-up captured.'
