title: Evaluate ~/ai/aida-chat for a shared, factorable AI-interface abstraction
description: 'Investigate ~/ai/aida-chat: what it does, how it interfaces with AI/LLMs (which crate/SDK, streaming, tool-use, prompt/model config, the trait/struct shape of its abstraction), and what could be factored out as a project-agnostic AI-interface crate that quizdom (EPIC-7) and aida-chat both consume. Output: commonality assessment + a concrete recommendation (reuse as-is / extract a shared crate / coordinate boundaries). Feeds the Rust stack decision and EPIC-7.'
